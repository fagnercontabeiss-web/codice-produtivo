<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A3829" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YOETZ" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <meta name="description" content="YOETZ Inteligência Empresarial — Sistema de gestão contábil" />
    <title>YOETZ</title>
    
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { box-sizing: border-box; }
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      @media print {
        nav, aside, button:not(.print-visible) { display: none !important; }
        body { background: white !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Limpar qualquer Service Worker existente e seus caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => {
            reg.unregister();
            console.log('[YOETZ] SW removido');
          });
        });
        // Limpar caches
        if ('caches' in window) {
          caches.keys().then(keys => {
            keys.forEach(key => {
              caches.delete(key);
              console.log('[YOETZ] Cache limpo:', key);
            });
          });
        }
      }
    </script>
  </body>
</html>
